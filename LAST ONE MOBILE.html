<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>VIARO — International School</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#wrap{display:block;background:#101820;border-radius:12px;padding:14px;font-family:'Courier New',monospace;max-width:480px;margin:0 auto;}
#canvasBox{position:relative;width:100%;padding-top:66.666%;overflow:hidden;border:3px solid #204830;border-radius:3px;}
#gameCanvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block;position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;border:none;}
#hud{width:100%;background:#0a1410;border:3px solid #204830;border-top:1px solid #102818;border-radius:0 0 8px 8px;padding:7px 14px;display:flex;justify-content:space-between;align-items:center;}
#zoneName{color:#a0f8c0;font-size:12px;letter-spacing:.8px;text-shadow:0 0 8px #20a040;}
#ctrls{color:#406850;font-size:10px;}
#musicBtn{cursor:pointer;font-size:14px;margin-left:10px;user-select:none;}
#touchCtrls{display:none;width:100%;justify-content:space-between;align-items:center;padding:18px 10px 4px;user-select:none;}
#dpad{position:relative;width:124px;height:124px;flex-shrink:0;}
.dbtn{position:absolute;width:42px;height:42px;background:#1a2e20;border:2px solid #3a6848;border-radius:8px;color:#a0f8c0;font-size:16px;display:flex;align-items:center;justify-content:center;touch-action:none;-webkit-tap-highlight-color:transparent;}
.dbtn:active,.dbtn.pressed{background:#2c5038;border-color:#58a878;}
#btnUp{top:0;left:41px;}
#btnDown{top:82px;left:41px;}
#btnLeft{top:41px;left:0;}
#btnRight{top:41px;left:82px;}
#btnAction{width:64px;height:64px;border-radius:50%;background:#204830;border:3px solid #58a878;color:#a0f8c0;font-size:20px;font-weight:bold;touch-action:none;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
#btnAction:active,#btnAction.pressed{background:#2c6840;}
@media (hover:none),(pointer:coarse){
  #touchCtrls{display:flex;}
  #ctrls{display:none;}
}
@media (max-width:420px){
  #zoneName{font-size:10px;}
  #dpad{width:108px;height:108px;}
  .dbtn{width:36px;height:36px;font-size:14px;}
  #btnUp{left:35px;}
  #btnDown{top:72px;left:35px;}
  #btnRight{top:35px;left:72px;}
  #btnLeft{top:35px;}
  #btnAction{width:56px;height:56px;font-size:18px;}
}
html,body{background:#06100a;min-height:100%;}
body{display:block;padding:16px 8px;}
</style>
</head>
<body>
<div id="wrap">
<div id="canvasBox">
<canvas id="gameCanvas" width="480" height="320" tabindex="0"></canvas>
</div>
<div id="hud"><span id="zoneName">🌿 Patio Principal — Colegio Esmeralda</span><span id="ctrls">WASD/↑↓←→ · ESPACIO<span id="musicBtn" title="Música">🔊</span></span></div>
<audio id="bgm" loop></audio>
<div id="touchCtrls">
  <div id="dpad">
    <button class="dbtn" id="btnUp" data-dir="ArrowUp">▲</button>
    <button class="dbtn" id="btnLeft" data-dir="ArrowLeft">◀</button>
    <button class="dbtn" id="btnDown" data-dir="ArrowDown">▼</button>
    <button class="dbtn" id="btnRight" data-dir="ArrowRight">▶</button>
  </div>
  <button id="btnAction">A</button>
</div>
</div>

ctx.imageSmoothingEnabled=false;
CV.setAttribute('tabindex','0');
CV.focus();
CV.addEventListener('click',()=>CV.focus());

// Carga el audio de forma diferida (setTimeout) para que la decodificación del base64 no bloquee
// el arranque del juego en navegadores móviles como Safari/iOS, donde asignarlo de forma síncrona
// puede congelar la pantalla varios segundos antes del primer frame.
setTimeout(()=>{ BGM.src=BGM_SRC; }, 50);
BGM.volume=0.4;
let musicMuted=false;
function tryPlayBGM(){
  if(!musicMuted&&BGM.paused)BGM.play().catch(()=>{});
}
musicBtn.addEventListener('click',()=>{
  musicMuted=!musicMuted;
  musicBtn.textContent=musicMuted?'🔇':'🔊';
  if(musicMuted)BGM.pause();else tryPlayBGM();
});
['keydown','click','touchstart'].forEach(ev=>document.addEventListener(ev,tryPlayBGM,{once:true}));

function hexCell(r0,c0){
  const cells=[];
  for(let dr=0;dr<6;dr++){
    let cMin=0,cMax=5;
    if(dr===0||dr===5){cMin=1;cMax=4;}
    for(let dc=cMin;dc<=cMax;dc++)cells.push([r0+dr,c0+dc]);
  }
  return cells;
}

function rf(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}

// Generic colored door (for the 4 new pavilions)
function drawDoorTile(x,y,S,c0,c1,c2,c3,glow,letter){
  rf(x,y,S,S,E.WA2);
  rf(x+2,y+1,12,15,c0);rf(x+3,y+2,10,13,c1);
  rf(x+4,y+3,8,8,c2);rf(x+5,y+4,6,6,c3);
  rf(x+5,y+4,2,2,glow);
  ctx.strokeStyle=E.BLK;ctx.lineWidth=1;ctx.strokeRect(x+2.5,y+1.5,11,14);
  ctx.fillStyle=E.BLK;ctx.font='bold 8px monospace';ctx.fillText(letter,x+6,y+13);
  rf(x+11,y+8,2,3,E.DK0);
}

function drawTile(tx,ty,sx,sy){
  const m=MAPS[currentMap];
  if(ty<0||ty>=m.length||tx<0||tx>=m[0].length){rf(sx,sy,TW,TW,'#000000');return;}
  const t=m[ty][tx];
  const x=sx,y=sy,S=TW;
  if(t===T.GRASS){
    rf(x,y,S,S,E.GR1);
    // Emerald checkerboard subtle
    if((tx+ty)%2===0)rf(x,y,S,S,E.GR2);
    // Highlight dabs
    rf(x+1,y+1,1,1,E.GR3);rf(x+8,y+6,2,1,E.GR3);rf(x+3,y+11,1,2,E.GR3);
    rf(x+12,y+3,1,1,E.GR4);rf(x+6,y+14,2,1,E.GR3);
    // Shadow edge
    rf(x,y,S,1,E.GR0);rf(x,y,1,S,E.GR0);
  }else if(t===T.PATH){
    rf(x,y,S,S,E.PA1);
    // Stone tile grid
    rf(x,y,S,1,E.PA0);rf(x,y,1,S,E.PA0);
    rf(x+8,y,1,S,E.PA0);rf(x,y+8,S,1,E.PA0);
    // Light center
    rf(x+2,y+2,5,5,E.PA2);rf(x+10,y+10,5,5,E.PA2);
    rf(x+S-1,y,1,S,E.PA0);rf(x,y+S-1,S,1,E.PA0);
  }else if(t===T.WALL){
    // Emerald school building — teal gradient bricks
    rf(x,y,S,S,E.WA2);
    // Horizontal brick lines
    for(let r=0;r<S;r+=4)rf(x,y+r,S,1,E.WA1);
    // Brick vertical offsets
    const off=(ty%2===0)?[4,12]:[0,8];
    off.forEach(ox=>rf(x+ox,y+1,1,3,E.WA1));
    // Top cap / roof ridge
    rf(x,y,S,3,E.WA0);rf(x,y,S,1,E.BLK);
    // Light edge
    rf(x+1,y+3,1,2,E.WA4);rf(x,y+S-2,S,2,E.WA0);
  }else if(t===T.TREE){
    rf(x,y,S,S,E.GR1);
    // Shadow base
    rf(x+1,y+11,14,5,E.TR0);
    // Trunk
    rf(x+6,y+9,4,7,E.TRTK);rf(x+7,y+9,2,7,'#907040');

    rf(x+2,y+3,12,7,E.TR2);
    rf(x+3,y+1,10,5,E.TR3);
    rf(x+5,y+0,6,3,E.TR4);
    // Highlight
    rf(x+6,y+1,3,2,E.TR4);rf(x+7,y+0,2,1,'#a0f890');
  }else if(t===T.BENCH){
    rf(x,y,S,S,E.GR1);
    rf(x+1,y+6,14,4,E.BN1);rf(x+1,y+6,14,1,E.BN2);rf(x+1,y+9,14,1,E.BN0);
    rf(x+2,y+10,3,5,E.BN0);rf(x+11,y+10,3,5,E.BN0);

    const c=(tx+ty)%2===0?E.IF2:E.IF1;
    rf(x,y,S,S,c);
    rf(x,y,S,1,E.IF0);rf(x,y,1,S,E.IF0);
    rf(x+S-1,y,1,S,E.IF0);rf(x,y+S-1,S,1,E.IF0);
  }else if(t===T.FOUNTAIN){
    rf(x,y,S,S,E.PA1);

    rf(x+5,y+4,1,3,E.WW3);rf(x+10,y+4,1,3,E.WW3);rf(x+7,y+0,2,2,E.WW4);

  }else if(t===T.FENCE){

    rf(x,y,S,S,c);
    rf(x,y,S,1,E.HL0);rf(x,y,1,S,E.HL0);

    rf(x+1,y+2,14,10,'#0c2858');rf(x+2,y+3,12,8,'#184078');

}

function drawHPBar(x,y,w,h,cur,max,override){
  rf(x,y,w,h,'#283020');
  const pct=Math.max(0,cur/max);
  const c=override||(pct>0.5?'#30d058':pct>0.25?'#d8c010':'#e03020');
  rf(x+1,y+1,Math.max(0,Math.floor((w-2)*pct)),h-2,c);
  // Shine
  rf(x+1,y+1,Math.max(0,Math.floor((w-2)*pct)),1,'rgba(255,255,255,0.3)');
  ctx.strokeStyle=E.BLK;ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);
}

function wrapTxt(txt,maxW,font){
  ctx.save();ctx.font=font||'11px "Courier New",monospace';
  const words=txt.split(' '),lines=[];let cur='';
  for(const w of words){
    const test=cur+(cur?' ':'')+w;
    if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}else cur=test;
  }
  if(cur)lines.push(cur);
  ctx.restore();return lines;
}

const NPC_MAP_SPRITE_IMGS={
  'Sr. Camara':CAMARA_MAP_SPRITE_IMG,
  'Sr. Russinyol':RUSSINYOL_MAP_SPRITE_IMG,
  'Sr. Ventura':VENTURA_MAP_SPRITE_IMG,
  'Mr. Francis':FRANCIS_MAP_SPRITE_IMG,
  'Sr. Dionis':DIONIS_MAP_SPRITE_IMG,
  'Mr. del Pino':DELPINO_MAP_SPRITE_IMG,
  'Sr. Canals':CANALS_MAP_SPRITE_IMG,
};
function drawNPCSprite(npc,ox,oy,scale){
  scale=scale||1;
  const mapImg=npc.isStudent?STUDENT_SPRITE_IMG:NPC_MAP_SPRITE_IMGS[npc.name];
  if(mapImg&&scale===1&&mapImg.complete&&mapImg.naturalWidth>0){
    const img=mapImg;
    const ratio=img.naturalWidth/img.naturalHeight;
    const h=TW+6,w=h*ratio;
    const cx=ox+TW/2, footY=oy+TW;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath();ctx.ellipse(cx,footY-1,5,2,0,0,Math.PI*2);ctx.fill();
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(img,cx-w/2,footY-h,w,h);
    ctx.restore();
    return;
  }
  ctx.save();ctx.translate(ox,oy);ctx.scale(scale,scale);
  const x=0,y=0;
  const tall=npc.heightOffset!==undefined?npc.heightOffset:(npc.tall?1:0);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(8,16,5,2,0,0,Math.PI*2);ctx.fill();
  // Shoes
  rf(4,13,4,3,E.BLK);rf(9,13,4,3,E.BLK);rf(4,14,4,1,'#282018');rf(9,14,4,1,'#282018');
  // Pants
  rf(4,9-tall,4,5+tall,npc.pants);rf(9,9-tall,3,5+tall,npc.pants);
  rf(4,9-tall,1,5+tall,lighten2(npc.pants));rf(9,9-tall,1,5+tall,lighten2(npc.pants));
  // Body
  rf(3,4-tall,10,6,npc.shirt);
  // Shirt highlight
  rf(3,4-tall,1,5,lighten2(npc.shirt));
  // Jacket — optional layer over the shirt (lapels + sides), leaves a shirt strip visible at center
  if(npc.jacket){
    rf(3,4-tall,3,6,npc.jacket);rf(10,4-tall,3,6,npc.jacket);
    rf(3,4-tall,1,6,lighten2(npc.jacket));rf(12,4-tall,1,6,lighten2(npc.jacket));
  }
  // Collar
  rf(6,4-tall,4,2,npc.skin);
  // Arms
  rf(2,5-tall,2,5,npc.jacket||npc.shirt);rf(12,5-tall,2,5,npc.jacket||npc.shirt);
  rf(2,9-tall,2,2,npc.skin);rf(12,9-tall,2,2,npc.skin);
  // Head
  rf(5,1-tall,6,5,npc.skin);
  // Forehead highlight
  rf(6,1-tall,2,1,lighten2(npc.skin));
  // Hair
  rf(5,1-tall,6,2,npc.hair);
  // Eyes
  rf(6,3-tall,1,1,E.BLK);rf(9,3-tall,1,1,E.BLK);
  // Glasses — only if npc.glasses is true
  if(npc.glasses){
    ctx.strokeStyle='rgba(40,20,0,0.8)';ctx.lineWidth=0.5/scale;
    ctx.strokeRect(5.5,2.5-tall,3,2);ctx.strokeRect(8.5,2.5-tall,3,2);
  }
  // Mustache — only if npc.mustache color is set
  if(npc.mustache){
    rf(6,4-tall,4,1,npc.mustache);
  }
  // Nose dot
  rf(7,4-tall,1,1,'#d0a070');
  ctx.restore();
}

function lighten2(hex){
  const n=parseInt(hex.replace('#',''),16)||0;
  const r=Math.min(255,((n>>16)&0xff)+40);
  const g=Math.min(255,((n>>8)&0xff)+40);
  const b=Math.min(255,(n&0xff)+40);
  return '#'+(((r<<16)|(g<<8)|b)).toString(16).padStart(6,'0');
}

// DIALOG
// ═══════════════════════════════════════════════════════
const CHAR_DELAY=22;
let dialog=null;
function startDialog(npc){dialog={npc,lineIndex:0,rendered:'',charIdx:0,timer:0};mode='dialog';}
function advanceDialog(){
  if(!dialog)return;
  if(dialog.charIdx<dialog.npc.lines[dialog.lineIndex].length){
    dialog.rendered=dialog.npc.lines[dialog.lineIndex];dialog.charIdx=dialog.rendered.length;
  }else{
    dialog.lineIndex++;
    if(dialog.lineIndex>=dialog.npc.lines.length){
      const npc=dialog.npc;dialog=null;
      if(npc.question||npc.questions){
        mode='battleFlash';pendingBattleNPC=npc;
        battleFlashTimer=0;battleFlashCount=0;battleFlashOn=false;
      }else{
        mode='explore';
      }
    }else{dialog.rendered='';dialog.charIdx=0;dialog.timer=0;}
  }
}
function updateDialog(dt){
  if(!dialog)return;
  const line=dialog.npc.lines[dialog.lineIndex];
  if(dialog.charIdx<line.length){
    dialog.timer+=dt;
    while(dialog.timer>=CHAR_DELAY&&dialog.charIdx<line.length){dialog.timer-=CHAR_DELAY;dialog.charIdx++;dialog.rendered=line.slice(0,dialog.charIdx);}
  }
}
function drawDialog(){
  if(!dialog)return;
  const bx=4,by=232,bw=472,bh=82;
  drawEBox(bx,by,bw,bh,'#e0f0d8');
  // Speaker tag

let battle=null;
function startBattle(npc){
  battle={npc,phase:'menu',menuCursor:0,answerCursor:0,qIndex:0,
    enemyHp:30,hpAnim:player.hp,
    msgText:'¡'+npc.name+' quiere examinarte!',
    msgRendered:'',msgChar:0,msgTimer:0,msgDone:false,
    resultText:'',resultRendered:'',resultChar:0,resultTimer:0,resultDone:false,
    playerShake:0,enemyShake:0,won:null,
    bgAnim:0};
  mode='battle';
}
function setBMsg(t){battle.msgText=t;battle.msgRendered='';battle.msgChar=0;battle.msgTimer=0;battle.msgDone=false;}
function setRMsg(t){battle.resultText=t;battle.resultRendered='';battle.resultChar=0;battle.resultTimer=0;battle.resultDone=false;}
function currentQ(npc,qIndex){
  return npc.questions?npc.questions[qIndex]:npc;
}
function totalQs(npc){
  return npc.questions?npc.questions.length:1;
}

function updateBattle(dt){
  if(!battle)return;
  battle.bgAnim=(battle.bgAnim+dt*0.02)%360;
  if(battle.msgChar<battle.msgText.length){
    battle.msgTimer+=dt;
    while(battle.msgTimer>=CHAR_DELAY&&battle.msgChar<battle.msgText.length){battle.msgTimer-=CHAR_DELAY;battle.msgChar++;battle.msgRendered=battle.msgText.slice(0,battle.msgChar);}
  }else battle.msgDone=true;
  if(battle.resultText&&battle.resultChar<battle.resultText.length){
    battle.resultTimer+=dt;
    while(battle.resultTimer>=CHAR_DELAY&&battle.resultChar<battle.resultText.length){battle.resultTimer-=CHAR_DELAY;battle.resultChar++;battle.resultRendered=battle.resultText.slice(0,battle.resultChar);}
  }else if(battle.resultText)battle.resultDone=true;
  if(battle.hpAnim>player.hp)battle.hpAnim=Math.max(player.hp,battle.hpAnim-0.25);
  if(battle.playerShake>0)battle.playerShake--;
  if(battle.enemyShake>0)battle.enemyShake--;
}

// BATTLE ACTIONS
// ═══════════════════════════════════════════════════════
function battleAction(){
  if(!battle)return;
  const b=battle;
  const npc=b.npc;
  const isBoss=!!npc.questions;
  if(b.phase==='menu'){
    if(!b.msgDone){b.msgRendered=b.msgText;b.msgChar=b.msgText.length;return;}
    if(b.menuCursor===0){b.phase='question';b.answerCursor=0;setBMsg(currentQ(npc,b.qIndex).question);}
    else{setBMsg('¡Has huido cobardemente del examen!');b.phase='flee';setTimeout(()=>{endBattle(false,true);},1200);}
  }else if(b.phase==='question'){
    if(!b.msgDone){b.msgRendered=b.msgText;b.msgChar=b.msgText.length;return;}
    b.phase='answering';
  }else if(b.phase==='answering'){
    const q=currentQ(npc,b.qIndex);
    const correct=b.answerCursor===q.correct;
    if(correct){
      if(isBoss){
        b.qIndex++;
        b.enemyHp=Math.max(0,30-Math.round((b.qIndex/totalQs(npc))*30));
        b.enemyShake=14;
        if(b.qIndex>=totalQs(npc)){
          npc.defeated=true;
          setBMsg('¡Respuesta CORRECTA! ¡Has superado el examen final!');
          b.phase='winWait';
          setTimeout(()=>{b.phase='result';b.won=true;setRMsg(npc.winText);},1400);
        }else{
          setBMsg('¡Correcto! Pregunta '+(b.qIndex+1)+' de '+totalQs(npc)+'...');
          b.phase='menu';b.menuCursor=0;
        }
      }else{
        b.enemyHp=0;b.enemyShake=20;npc.defeated=true;
        setBMsg('¡Respuesta CORRECTA! ¡'+npc.name+' derrotado!');
        b.phase='winWait';
        setTimeout(()=>{b.phase='result';b.won=true;setRMsg(npc.winText);},1400);
      }
    }else{
      const dmg=Math.floor(Math.random()*6)+5;
      player.hp=Math.max(0,player.hp-dmg);
      b.playerShake=18;
      setBMsg('¡Respuesta incorrecta! -'+dmg+' Energía Mental.');
      b.phase='wrongWait';
      setTimeout(()=>{
        if(player.hp<=0){b.phase='result';b.won=false;setRMsg(q.loseText+' Te quedaste sin Energía.');player.hp=player.maxHp;}
        else{b.phase='menu';b.menuCursor=0;setBMsg('¡'+npc.name+' lanza otra pregunta! HP: '+player.hp+'/'+player.maxHp);}
      },1600);
    }
  }else if(b.phase==='result'){
    if(!b.resultDone){b.resultRendered=b.resultText;b.resultChar=b.resultText.length;return;}
    const wasFinalBossWin=npc.isFinalBoss&&b.won;
    endBattle(b.won,false);
    if(wasFinalBossWin)startConfetti();
  }
}
function endBattle(){mode='explore';battle=null;document.getElementById('zoneName').textContent=ZONE_NAMES[currentMap];}

function doMenuNav(key){
  if(mode==='battle'&&battle){
    if(battle.phase==='menu'){
      if(['ArrowLeft','a','A'].includes(key))battle.menuCursor=0;
      if(['ArrowRight','d','D'].includes(key))battle.menuCursor=1;
      if(['ArrowUp','w','W'].includes(key))battle.menuCursor=0;
      if(['ArrowDown','s','S'].includes(key))battle.menuCursor=1;
    }
    if(battle.phase==='answering'){
      if(['ArrowUp','w','W'].includes(key))battle.answerCursor=Math.max(0,battle.answerCursor-1);
      if(['ArrowDown','s','S'].includes(key))battle.answerCursor=Math.min(2,battle.answerCursor+1);
    }

}
CV.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','w','a','s','d','W','A','S','D'].includes(e.key))e.preventDefault();
  if(!keys[e.key]){
    keys[e.key]=true;
    if(e.key===' ')doActionPress();
    doMenuNav(e.key);
  }
});
CV.addEventListener('keyup',e=>{keys[e.key]=false;});

// ── Controles táctiles — D-pad y botón de acción para jugar desde móvil ──
(function setupTouchControls(){
  const dirButtons=[['btnUp','ArrowUp'],['btnDown','ArrowDown'],['btnLeft','ArrowLeft'],['btnRight','ArrowRight']];
  dirButtons.forEach(([id,key])=>{
    const btn=document.getElementById(id);
    if(!btn)return;
    const press=(ev)=>{ev.preventDefault();keys[key]=true;btn.classList.add('pressed');CV.focus();};
    const release=(ev)=>{if(ev)ev.preventDefault();keys[key]=false;btn.classList.remove('pressed');};
    btn.addEventListener('touchstart',press,{passive:false});
    btn.addEventListener('touchend',release,{passive:false});
    btn.addEventListener('touchcancel',release,{passive:false});
    btn.addEventListener('mousedown',press);
    btn.addEventListener('mouseup',release);
    btn.addEventListener('mouseleave',release);
  });
  const actionBtn=document.getElementById('btnAction');
  if(actionBtn){
    const triggerAction=(ev)=>{
      ev.preventDefault();
      actionBtn.classList.add('pressed');
      doActionPress();
      doMenuNav(' ');
      CV.focus();
      setTimeout(()=>actionBtn.classList.remove('pressed'),120);
    };
    actionBtn.addEventListener('touchstart',triggerAction,{passive:false});
    actionBtn.addEventListener('mousedown',triggerAction);
  }
  // En el menú de combate y respuestas, el D-pad también debe mover el cursor (no solo moverse por el mapa)
  ['btnUp','btnDown','btnLeft','btnRight'].forEach(id=>{
    const btn=document.getElementById(id);
    if(!btn)return;
    const key=dirButtons.find(d=>d[0]===id)[1];
    const navPress=(ev)=>{if(mode==='battle')doMenuNav(key);};
    btn.addEventListener('touchstart',navPress,{passive:false});
    btn.addEventListener('mousedown',navPress);
  });
})();

function doTransition(destMap,dx,dy){
  flashDir=1;flashAlpha=0;let step=0;
  const iv=setInterval(()=>{
    step++;
    if(step<10)flashAlpha=step/10;
    else if(step===10){currentMap=destMap;player.x=dx;player.y=dy;document.getElementById('zoneName').textContent=ZONE_NAMES[destMap];}
    else{flashAlpha=1-(step-10)/10;if(step>=20){flashAlpha=0;flashDir=0;clearInterval(iv);teleportCooldown=600;}}
  },25);
}

let lastTime=0,moveDelay=0;
// ═══════════════════════════════════════════════════════
// WALKING NPCs — simple back-and-forth patrol
// ═══════════════════════════════════════════════════════
function updateWalkers(dt){
  for(const n of NPCS){
    if(!n.walker||n.map!==currentMap)continue;
    n.walkTimer=(n.walkTimer||0)+dt;
    if(n.walkTimer<500)continue;
    n.walkTimer=0;
    let nx=n.x,ny=n.y;
    if(n.axis==='h'){
      nx=n.x+n.pdir;
      if(nx<n.min||nx>n.max){n.pdir*=-1;nx=n.x+n.pdir;}
      n.dir=n.pdir>0?1:3;
    }else{
      ny=n.y+n.pdir;
      if(ny<n.min||ny>n.max){n.pdir*=-1;ny=n.y+n.pdir;}
      n.dir=n.pdir>0?2:0;
    }
    const m=MAPS[n.map];
    if(ny<0||ny>=m.length||nx<0||nx>=m[0].length)continue;
    const tile=m[ny][nx];
    const occupied=(player.x===nx&&player.y===ny&&currentMap===n.map)||
      NPCS.some(o=>o!==n&&o.map===n.map&&o.x===nx&&o.y===ny&&!o.defeated);
    if(WALKABLE.has(tile)&&!occupied&&tile!==T.GATE&&tile!==T.GATE2&&tile!==T.GATE3&&tile!==T.GATE4&&tile!==T.GATE5&&tile!==T.GATE6&&tile!==T.GATE7&&tile!==T.GATE8&&tile!==T.GATE9&&tile!==T.GATE10&&tile!==T.GATE11){
      n.x=nx;n.y=ny;
    }
  }
}

function checkFinalBossUnlock(){
  const finalBoss=NPCS.find(n=>n.isFinalBoss);
  if(!finalBoss||!finalBoss.locked)return;
  const allDefeated=NPCS.filter(n=>!n.isFinalBoss&&!n.isStudent).every(n=>n.defeated);
  if(allDefeated)finalBoss.locked=false;
}
function update(dt){
  if(mode==='dialog')updateDialog(dt);
  if(mode==='explore'||mode==='dialog')updateWalkers(dt);
  if(mode==='battleFlash'){
    battleFlashTimer+=dt;
    if(battleFlashTimer>70){battleFlashTimer=0;battleFlashCount++;battleFlashOn=!battleFlashOn;
      if(battleFlashCount>=12){mode='battle';battleFlashOn=false;startBattle(pendingBattleNPC);pendingBattleNPC=null;}}
  }
  if(mode==='battle')updateBattle(dt);
  if(mode==='confetti')updateConfetti(dt);
  if(mode!=='explore')return;
  checkFinalBossUnlock();
  if(teleportCooldown>0)teleportCooldown-=dt;
  if(moveDelay>0){moveDelay-=dt;return;}
  let dx=0,dy=0;
  if(keys['ArrowUp']||keys['w']||keys['W']){dy=-1;player.dir=0;}
  else if(keys['ArrowDown']||keys['s']||keys['S']){dy=1;player.dir=2;}
  else if(keys['ArrowLeft']||keys['a']||keys['A']){dx=-1;player.dir=3;}
  else if(keys['ArrowRight']||keys['d']||keys['D']){dx=1;player.dir=1;}
  if(dx||dy){
    const nx=player.x+dx,ny=player.y+dy;
    const mapRows=MAPS[currentMap].length, mapCols=MAPS[currentMap][0].length;
    if(nx>=0&&nx<mapCols&&ny>=0&&ny<mapRows){
      const tile=MAPS[currentMap][ny][nx];
      const blocked=NPCS.some(n=>n.map===currentMap&&n.x===nx&&n.y===ny&&!n.defeated);
      if(WALKABLE.has(tile)&&!blocked){
        player.x=nx;player.y=ny;
        if(teleportCooldown<=0)for(const tp of TELEPORTS)if(tp.map===currentMap&&tile===tp.tile){doTransition(tp.dest,tp.dx,tp.dy);break;}
      }
    }
    player.moving=true;moveDelay=145;
  }else player.moving=false;
}

function render(){
  ctx.clearRect(0,0,480,320);
  updateCamera();

  if(mode==='battleFlash'){
    ctx.save();ctx.scale(ZOOM,ZOOM);
    for(let rr=0;rr<VH;rr++)for(let cc=0;cc<VW;cc++)drawTile(cc+camX,rr+camY,cc*TW,rr*TW);
    for(const n of NPCS)if(n.map===currentMap&&!n.defeated&&!n.locked)drawNPCSprite(n,(n.x-camX)*TW,(n.y-camY)*TW,1);
    drawPlayerSprite((player.x-camX)*TW,(player.y-camY)*TW,1,player.dir,player.moving);
    ctx.restore();
    if(battleFlashOn)rf(0,0,480,320,'rgba(220,255,220,0.92)');
    else rf(0,0,480,320,'rgba(0,20,10,0.75)');
    return;
  }
  if(mode==='battle'){drawBattleScreen();return;}
  if(mode==='confetti'){drawConfettiScreen();return;}

  // Explore / dialog
  ctx.save();ctx.scale(ZOOM,ZOOM);
  for(let rr=0;rr<VH;rr++)for(let cc=0;cc<VW;cc++)drawTile(cc+camX,rr+camY,cc*TW,rr*TW);
  for(const n of NPCS){
    if(n.map!==currentMap||n.defeated||n.locked)continue;
    const sx=(n.x-camX)*TW,sy=(n.y-camY)*TW;
    drawNPCSprite(n,sx,sy,1);
    if(mode==='explore'&&Math.abs(n.x-player.x)<=1&&Math.abs(n.y-player.y)<=1){
      // Emerald exclamation — teal with glow
      rf(sx+4,sy-9,4,1,'#28c858');
      rf(sx+4,sy-8,4,6,'#28c858');
      rf(sx+4,sy-1,4,3,'#28c858');
    }
  }
  drawPlayerSprite((player.x-camX)*TW,(player.y-camY)*TW,1,player.dir,player.moving);
  ctx.restore();
  if(mode==='dialog')drawDialog();

  // Scanlines subtle
  ctx.fillStyle='rgba(0,0,0,0.025)';
  for(let yy=0;yy<320;yy+=2)ctx.fillRect(0,yy,480,1);
  // Soft vignette
  const v=ctx.createRadialGradient(240,160,110,240,160,270);
  v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(0,10,5,0.38)');
  ctx.fillStyle=v;ctx.fillRect(0,0,480,320);
  if(flashAlpha>0){ctx.fillStyle=`rgba(200,255,210,${flashAlpha})`;ctx.fillRect(0,0,480,320);}

  // HP bar explore HUD
  if(mode==='explore'||mode==='dialog'){
    drawEBox(346,2,130,24,'#e0f0d8');
    ctx.fillStyle='#0c2010';ctx.font='8px "Courier New",monospace';ctx.fillText('Energía Mental',352,13);
    drawHPBar(352,15,116,6,player.hp,player.maxHp);
  }
}

function loop(ts){const dt=ts-lastTime;lastTime=ts;update(dt);render();requestAnimationFrame(loop);}
requestAnimationFrame(ts=>{lastTime=ts;loop(ts);});
</script>
</body>
</html>
